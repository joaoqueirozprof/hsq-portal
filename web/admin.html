<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSQ Rastreamento - Admin</title>
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .login-container { width:100%;max-width:420px;padding:20px; }
    .login-card { background:#1e293b;border-radius:16px;padding:40px 32px;border:1px solid #334155; }
    .login-logo { text-align:center;margin-bottom:32px; }
    .login-logo img { width:72px;height:72px;border-radius:12px;margin-bottom:12px; }
    .login-logo h1 { color:#e2e8f0;font-size:22px;margin-bottom:4px; }
    .login-logo p { color:#94a3b8;font-size:13px; }
    .badge { display:inline-block;background:rgba(139,92,246,0.15);color:#a78bfa;font-size:11px;padding:4px 10px;border-radius:6px;margin-top:8px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block;color:#94a3b8;font-size:13px;margin-bottom:6px;font-weight:500; }
    .form-group input { width:100%;padding:12px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none;transition:border-color 0.2s; }
    .form-group input:focus { border-color:#6366f1; }
    .btn-primary { width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s; }
    .btn-primary:hover { opacity:0.9; }
    .btn-primary:disabled { opacity:0.5;cursor:not-allowed; }
    .error-msg { display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;color:#f87171;font-size:13px;margin-bottom:16px;text-align:center; }
    .error-msg.show { display:block; }
    .back-link { text-align:center;margin-top:20px; }
    .back-link a { color:#64748b;font-size:12px;text-decoration:none; }
    .back-link a:hover { color:#94a3b8; }
    .spinner { display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="/logo-login.png" alt="HSQ">
        <h1>HSQ Rastreamento</h1>
        <span class="badge">Painel Administrativo</span>
      </div>
      <div id="error" class="error-msg"></div>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="admin@hsqrastreamento.com" required autofocus>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="password" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="btn-primary" id="btn-login">Entrar</button>
      </form>
      <div class="back-link">
        <a href="/">Voltar ao portal</a>
      </div>
    </div>
  </div>
  <script>
    var API_URL = '/api';
    async function handleLogin(e) {
      e.preventDefault();
      var btn = document.getElementById('btn-login');
      var errEl = document.getElementById('error');
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Entrando...';
      try {
        var resp = await fetch(API_URL + '/auth/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        var data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Credenciais invalidas');
        localStorage.setItem('hsq_token', data.token);
        localStorage.setItem('hsq_user', JSON.stringify({ ...data.user, role: 'admin' }));
        window.location.href = '/';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }
  </script>
</body>
</html>
