server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # SPA: all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA: Service Worker must be served with no-cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript";
    }

    # PWA: Manifest
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/manifest+json";
    }

    # Static assets: cache aggressively (hashed filenames)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # PWA: Icons
    location /icons/ {
        add_header Cache-Control "public, max-age=86400";
    }

    # API proxy
    location /api/ {
        proxy_pass http://hsq-api:4080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long polling: disable buffering and increase timeouts
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Traccar proxy
    location /traccar/ {
        proxy_pass http://172.21.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Logo from Traccar
    location /logo-login.png {
        proxy_pass http://172.21.0.1:8082/logo-login.png;
    }
}
