server {
    listen 80;
    server_name _;

    # Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin page
    location /admin {
        root /usr/share/nginx/html;
        try_files /admin.html =404;
    }

    # API proxy (includes SSE streaming for real-time tracking)
    location /api/ {
        proxy_pass http://hsq-api:4080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE: disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Traccar proxy (so client can be redirected)
    location /traccar/ {
        proxy_pass http://172.21.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Logo image from Traccar
    location /logo-login.png {
        proxy_pass http://172.21.0.1:8082/logo-login.png;
    }
}
