version: '3.8'

services:
  hsq-db:
    image: postgres:16-alpine
    container_name: hsq-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - hsq-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsq_admin -d hsq_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hsq-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hsq-api
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      TRACCAR_URL: "${TRACCAR_URL}"
      TRACCAR_ADMIN_EMAIL: "${TRACCAR_ADMIN_EMAIL}"
      TRACCAR_ADMIN_PASSWORD: "${TRACCAR_ADMIN_PASSWORD}"
      ADMIN_SEED_EMAIL: "${ADMIN_SEED_EMAIL}"
      ADMIN_SEED_PASSWORD: "${ADMIN_SEED_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      PORT: "${PORT:-4080}"
    depends_on:
      hsq-db:
        condition: service_healthy
    restart: unless-stopped

  hsq-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: hsq-web
    ports:
      - "${HSQ_WEB_PORT:-3080}:80"
    depends_on:
      - hsq-api
    restart: unless-stopped


volumes:
  hsq-pgdata:
