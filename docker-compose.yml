version: '3.8'

services:
  hsq-db:
    image: postgres:16-alpine
    container_name: hsq-db
    environment:
      POSTGRES_USER: "hsq_admin"
      POSTGRES_PASSWORD: "HsqSecure2026"
      POSTGRES_DB: "hsq_portal"
    volumes:
      - hsq-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsq_admin -d hsq_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hsq-api:
    image: node:20-alpine
    container_name: hsq-api
    environment:
      DATABASE_URL: "postgresql://hsq_admin:HsqSecure2026@hsq-db:5432/hsq_portal"
      TRACCAR_URL: "http://172.21.0.1:8082"
      TRACCAR_ADMIN_EMAIL: "admin@hsqrastreamento.com"
      TRACCAR_ADMIN_PASSWORD: "HSQ@2026Admin!"
      JWT_SECRET: "hsq-jwt-secret-2026-prod"
      CORS_ORIGIN: "*"
      PORT: "4080"
    depends_on:
      hsq-db:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache git >/dev/null 2>&1
        mkdir -p /app
        git clone --depth 1 https://github.com/joaoqueirozprof/hsq-portal.git /tmp/repo
        cp -r /tmp/repo/api/src /app/src
        cp /tmp/repo/api/package.json /app/package.json
        rm -rf /tmp/repo
        cd /app
        npm install --production
        node src/index.js
    working_dir: /app
    restart: unless-stopped

  hsq-web:
    image: nginx:alpine
    container_name: hsq-web
    ports:
      - "3080:80"
    depends_on:
      - hsq-api
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache git >/dev/null 2>&1
        git clone --depth 1 https://github.com/joaoqueirozprof/hsq-portal.git /tmp/repo
        cp /tmp/repo/web/index.html /usr/share/nginx/html/index.html
        cp /tmp/repo/web/nginx.conf /etc/nginx/conf.d/default.conf
        rm -rf /tmp/repo
        nginx -g 'daemon off;'
    restart: unless-stopped


volumes:
  hsq-pgdata:
