name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        run: npm install --prefix api

      - name: Check API syntax
        run: find api/src -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Build API image
        run: docker build -t hsq-portal-api-test ./api

      - name: Build web image
        run: docker build -t hsq-portal-web-test ./web
